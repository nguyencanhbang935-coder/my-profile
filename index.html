<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nguyễn Cảnh Bằng - Profile</title>
    <style>
        body {
            margin: 0; padding: 0;
            font-family: Arial, sans-serif;
            background-color: #0d1117;
            color: white;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh;
        }
        .container { text-align: center; padding: 20px; }
        .avatar-container {
            position: relative; width: 180px; height: 180px; margin: 0 auto 20px;
        }
        .avatar-container::before {
            content: ''; position: absolute;
            top: -10px; left: -10px; right: -10px; bottom: -10px;
            border-radius: 50%;
            background: linear-gradient(45deg, #ff004c, #3300ff);
            z-index: -1; filter: blur(15px);
            animation: pulse 3s infinite;
        }
        img.avatar {
            width: 100%; height: 100%;
            border-radius: 50%; object-fit: cover;
            border: 3px solid #fff;
        }
        h1 { font-size: 2rem; margin: 10px 0; letter-spacing: 2px; text-transform: uppercase; }
        .description { color: #8b949e; margin-bottom: 30px; }
        .links { display: flex; flex-direction: column; gap: 15px; width: 300px; }
        .link-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 12px; border-radius: 8px;
            text-decoration: none; color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }
        .link-card:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px); border-color: #ff004c;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="avatar-container">
            <img src="avatar.jpg" alt="Nguyễn Cảnh Bằng" class="avatar">
        </div>
        <h1>NGUYỄN CẢNH BẰNG</h1>
        <p class="description">Welcome to my profile</p>
        <div class="links">
            <a href="#" class="link-card">Facebook</a>
            <a href="#" class="link-card">Instagram</a>
            <a href="#" class="link-card">TikTok</a>
            <a href="#" class="link-card">Zalo</a>
        </div>
    </div>
</body>
</html>
