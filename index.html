<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nguyễn Cảnh Bằng | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #050505; font-family: 'Segoe UI', sans-serif; color: white; }
        #particles-js { position: absolute; width: 100%; height: 100%; z-index: 1; }
        
        .main-content {
            position: relative; z-index: 2; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0, 0, 0, 0.2); backdrop-filter: blur(2px);
        }

        .avatar {
            width: 150px; height: 150px; border-radius: 50%;
            border: 4px solid #00f2ff; box-shadow: 0 0 20px #00f2ff;
            object-fit: cover; margin-bottom: 20px;
        }

        h1 { font-size: 2.5rem; margin: 10px 0; letter-spacing: 5px; text-transform: uppercase; }
        .typing-text { font-size: 1.2rem; color: #00f2ff; height: 30px; margin-bottom: 30px; }

        .social-links { display: flex; gap: 20px; }
        .social-links a {
            color: white; font-size: 1.5rem; transition: 0.3s;
            width: 50px; height: 50px; border: 1px solid rgba(255,255,255,0.2);
            display: flex; align-items: center; justify-content: center; border-radius: 50%;
            text-decoration: none;
        }
        .social-links a:hover { background: #00f2ff; color: black; box-shadow: 0 0 20px #00f2ff; transform: translateY(-5px); }
    </style>
</head>
<body>
    <div id="particles-js"></div>

    <div class="main-content">
        <img src="avatar.jpg" alt="Nguyễn Cảnh Bằng" class="avatar">
        <h1>Nguyễn Cảnh Bằng</h1>
        <div class="typing-text"><span id="typed"></span></div>

        <div class="social-links">
            <a href="#"><i class="fab fa-facebook-f"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-github"></i></a>
            <a href="#"><i class="fas fa-envelope"></i></a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        // Hiệu ứng gõ chữ
        new Typed('#typed', {
            strings: ['IT Student', 'C# Developer', 'Tokusatsu Fan', 'Gamer'],
            typeSpeed: 60, backSpeed: 40, loop: true
        });

        // Cấu hình hạt bay
        particlesJS('particles-js', {
            "particles": {
                "number": { "value": 80 },
                "color": { "value": "#00f2ff" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.5 },
                "size": { "value": 3 },
                "line_linked": { "enable": true, "distance": 150, "color": "#00f2ff", "opacity": 0.4, "width": 1 },
                "move": { "enable": true, "speed": 2 }
            }
        });
    </script>
</body>
</html>
