<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nguyễn Cảnh Bằng | Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0; padding: 0; box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: white;
        }

        /* Hiệu ứng nền có vòng sáng và hạt bụi giống mẫu */
        .background {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a1a2e 0%, #000 100%);
            z-index: -1;
        }

        .background::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.3;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 30px;
            border-radius: 24px;
            text-align: center;
            width: 380px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        /* Vòng sáng quanh ảnh đại diện */
        .avatar-box {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto 20px;
        }

        .avatar-box::before {
            content: "";
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            background: linear-gradient(45deg, #00f2ff, #7000ff, #ff007a);
            z-index: -1;
            filter: blur(10px);
            animation: rotate 4s linear infinite;
        }

        img.avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.8);
        }

        h1 {
            font-size: 1.6rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .subtitle {
            font-size: 0.85rem;
            color: #00f2ff;
            margin-bottom: 30px;
            letter-spacing: 1px;
            opacity: 0.8;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-item {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.08);
            padding: 12px 20px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            font-weight: 500;
            transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .link-item i {
            margin-right: 15px;
            font-size: 1.2rem;
            width: 20px;
        }

        .link-item:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.02);
            border-color: #00f2ff;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.4);
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="background"></div>
    
    <div class="profile-card">
        <div class="avatar-box">
            <img src="avatar.jpg" alt="Nguyễn Cảnh Bằng" class="avatar">
        </div>
        
        <h1>Nguyễn Cảnh Bằng</h1>
        <p class="subtitle">IT STUDENT & CODER</p>
        
        <div class="links-container">
            <a href="https://facebook.com" target="_blank" class="link-item">
                <i class="fab fa-facebook"></i> Facebook
            </a>
            <a href="https://instagram.com" target="_blank" class="link-item">
                <i class="fab fa-instagram"></i> Instagram
            </a>
            <a href="https://zalo.me" target="_blank" class="link-item">
                <i class="fa-solid fa-comment"></i> Zalo
            </a>
            <a href="https://github.com" target="_blank" class="link-item">
                <i class="fab fa-github"></i> GitHub
            </a>
        </div>
    </div>
</body>
</html>
